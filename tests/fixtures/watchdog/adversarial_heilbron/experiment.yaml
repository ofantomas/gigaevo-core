schema_version: 1
experiment:
  name: heilbron/adversarial-test
  task: heilbron
  status: running
  branch: exp/heilbron/adversarial-test
  max_generations: 50
  pr_number: 200
problem:
  has_test_set: true
  fitness_type: continuous
  metric_name: actual_fitness
runs:
  - label: C1_G
    db: 2
    prefix: "pop_a_cond1"
    pipeline: standard
    problem_name: "chains/heilbron/prover"
    condition: "condition_1_G"
    mutation_url: "http://INTERNAL_IP:4000"
    model_name: "gemini-2.5-flash"
    pid: 20001
  - label: C1_D
    db: 3
    prefix: "pop_b_cond1"
    pipeline: standard
    problem_name: "chains/heilbron/improver"
    condition: "condition_1_D"
    mutation_url: "http://INTERNAL_IP:4000"
    model_name: "gemini-2.5-flash"
    pid: 20002
  - label: C2_G
    db: 6
    prefix: "pop_a_cond2"
    pipeline: standard
    problem_name: "chains/heilbron/prover"
    condition: "condition_2_G"
    mutation_url: "http://INTERNAL_IP:4000"
    model_name: "gemini-2.5-flash"
    pid: 20003
  - label: C2_D
    db: 7
    prefix: "pop_b_cond2"
    pipeline: standard
    problem_name: "chains/heilbron/improver"
    condition: "condition_2_D"
    mutation_url: "http://INTERNAL_IP:4000"
    model_name: "gemini-2.5-flash"
    pid: 20004
servers:
  - "INTERNAL_IP"
config:
  num_parents: 1
  max_elites_per_generation: 8
baseline:
  reference: "heilbron-sota"
  mean: 0.03449
  metric: actual_fitness
smoke_test:
  completed: true
  completed_at: "2026-04-10T10:00:00Z"
launch:
  time: "2026-04-10T10:00:00Z"
  commit: "def456"
watchdog:
  plugin: adversarial
  plot_metrics: ["actual_fitness"]
  plot_commands:
    - command: arms-race
      args:
        metric: actual_fitness
        paired: "C1_G:C1_D,C2_G:C2_D"
      output_name: arms_race
      caption: "Arms-race dynamics"
    - command: comparison
      args:
        metric: actual_fitness
        smoothing: ema
        window: 10
        annotate-frontier: true
        max-annotations: 3
        no-frontier-for: "C1_D,C2_D"
      output_name: g_fitness
      caption: "All runs actual_fitness vs SOTA"
  alert_thresholds:
    invalidity_rate: 0.75
    stagnation_window: 10
