# @package _global_
# Filename kept for plan continuity; backend is OpenRouter, not opencode.ai.
# DeepSeek family routed through OpenRouter.
# Model: deepseek/deepseek-v4-pro (ctx=1,048,576, $0.435/M prompt, $0.87/M completion)

llm:
  _target_: gigaevo.llm.models.MultiModelRouter
  _convert_: all
  structured_output_method: json_schema
  models:
    - _target_: langchain_openai.ChatOpenAI
      model: deepseek/deepseek-v4-pro
      api_key: ${oc.env:OPENROUTER_API_KEY}
      temperature: ${temperature}
      max_tokens: ${max_tokens}
      base_url: https://openrouter.ai/api/v1
      request_timeout: ${request_timeout}
  probabilities: [1.0]
  writer: ${writer}
