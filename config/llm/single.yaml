# @package _global_

llm:
  _target_: gigaevo.llm.models.MultiModelRouter
  _convert_: all
  models:
    - _target_: langchain_openai.ChatOpenAI

      model: ${model_name}
      api_key: ${oc.env:OPENAI_API_KEY}
      temperature: ${temperature}
      max_tokens: ${max_tokens}
      base_url: ${llm_base_url}
      # httpx/openai SDK does not detect peer-closed TCP sockets (CLOSE-WAIT
      # dead-connection bug). Without an inactivity timeout the DAG stage
      # hangs until stage_timeout (1800s). 600s is generous for 235B-Thinking
      # generation while still capping worst-case stall.
      request_timeout: 600
      max_retries: 2
      # OpenRouter reasoning control (forwarded verbatim into the request body;
      # OpenRouter reads the top-level `reasoning` field). qwen3.7-max is a
      # hybrid model with no native effort tiers, so thinking is enabled with an
      # explicit token budget. 20000 sits well under max_tokens (81920) and
      # leaves ample room for the program output.
      extra_body:
        reasoning:
          enabled: true
          max_tokens: 20000
  probabilities: [1.0]
  writer: ${writer}
