# @package _global_

defaults: [single_island, _self_]

# 2D behavior space for D (Improver) population v3
# x-axis: fitness (tanh-smoothed mean improvement vs current G HoF)
# y-axis: wins (career count of distinct G programs beaten; fallback to opponent_coverage_count if tracker drifts)
behavior_space:
  _target_: gigaevo.config.helpers.build_behavior_space
  keys: [fitness, wins]
  bounds: [[0.0, 1.0], [0, 250]]
  resolutions: [15, 15]
  binning_types: [linear, linear]

# Niche-structured selection: intra-cell tie-break on fitness (mean improvement); inter-cell diversity on career wins
archive_selector:
  _target_: gigaevo.evolution.strategies.selectors.SumArchiveSelector
  fitness_keys: [fitness]
  fitness_key_higher_is_better: [true]

archive_remover:
  _target_: gigaevo.evolution.strategies.removers.FitnessArchiveRemover
  fitness_key: fitness
  fitness_key_higher_is_better: true

elite_selector:
  _target_: gigaevo.evolution.strategies.elite_selectors.FitnessProportionalEliteSelector
  fitness_key: wins
  fitness_key_higher_is_better: true

migrant_selector:
  _target_: gigaevo.evolution.strategies.migrant_selectors.TopFitnessMigrantSelector
  fitness_key: wins
  fitness_key_higher_is_better: true
