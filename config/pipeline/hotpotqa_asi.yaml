# @package _global_
# Required pipeline for ALL HotpotQA problem variants.
#
# validate.py returns (metrics, failures); FetchArtifact extracts failures (all);
# HotpotQAASIFormatter renders them with per-hop BM25 retrieval diagnostics.
# FormatterStage random-samples up to 10 failures per generation for the LLM.
#
# Usage (any hotpotqa problem.name):
#   python run.py problem.name=chains/hotpotqa/static     pipeline=hotpotqa_asi ...
#   python run.py problem.name=chains/hotpotqa/static_f1  pipeline=hotpotqa_asi ...
#   python run.py problem.name=chains/hotpotqa/static_f1_600 pipeline=hotpotqa_asi ...
#   python run.py problem.name=chains/hotpotqa/static_600 pipeline=hotpotqa_asi ...
#   python run.py problem.name=chains/hotpotqa/static_a   pipeline=hotpotqa_asi ...
#   python run.py problem.name=chains/hotpotqa/static_ra  pipeline=hotpotqa_asi ...
#
# NEVER use pipeline=standard for hotpotqa — validate.py returns a tuple,
# and standard calls repr() on it (repr-contamination bug, PR #67).

evolution_context:
  _target_: gigaevo.entrypoint.evolution_context.EvolutionContext
  problem_ctx: ${problem_context}
  llm_wrapper: ${ref:llm}
  storage: ${redis_storage}
  prompts_dir: ${prompts.dir}

pipeline_builder:
  _target_: problems.chains.hotpotqa.static_a.pipeline.ASIPipelineBuilder
  ctx: ${evolution_context}
  stage_timeout: ${stage_timeout}
  dag_timeout: ${dag_timeout}

dag_blueprint:
  _target_: gigaevo.config.helpers.build_dag_from_builder
  builder: ${pipeline_builder}
