# @package _global_
# v3: asymmetric adversarial pipeline with cell-stratified opponent provider.
# Only difference from `adversarial_asymmetric`: swaps RedisOpponentArchiveProvider
# → CellStratifiedRedisOpponentArchiveProvider (single-DB signature).
#
# fitness_key MUST still be set per-run via extra_overrides:
#   - G side samples D opponents → opponent_provider.fitness_key=fitness
#   - D side samples G opponents → opponent_provider.fitness_key=actual_fitness

defaults:
  - adversarial_asymmetric
  - _self_

# Replace the inherited block entirely.
# (Hydra list syntax — omitted keys are dropped when the mapping is replaced
# at this level by _self_ ordering above the include.)
opponent_provider:
  _target_: gigaevo.adversarial.opponent_provider.CellStratifiedRedisOpponentArchiveProvider
  host: ${redis.host}
  port: ${redis.port}
  db: ${opponent_redis_db}
  prefix: ${opponent_redis_prefix}
  fitness_key: ???
  higher_is_better: true
  k: 3
