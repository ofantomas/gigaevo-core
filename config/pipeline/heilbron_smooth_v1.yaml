# @package _global_
# Heilbronn smoothed-fitness baseline pipeline.
#
# This pipeline ships the v1 adversarial topology (commit 04bd5e69 / PR #204)
# WITH the fitness smoothing patches applied to both populations:
#   - pop_a (G / Constructor): linear-smoothed resistance, commit 2de8267e (PR #219)
#   - pop_b (D / Improver):    tanh-smoothed improvement, commit 3eb41b43
#
# Paired with frozen problem dirs at:
#   problems/heilbron_smooth_v1/pop_a/   — linear smooth
#   problems/heilbron_smooth_v1/pop_b/   — tanh smooth
#
# `heilbron_repro_v1` (the older pipeline + dirs) is RETIRED for new work.
# That dir was originally meant to freeze v1's hard-floor fitness, but PRs
# #219 and the d-smoothing-minimal predecessor mutated its evaluate.py in
# place — so the name no longer matches its contents. We keep
# heilbron_repro_v1/ on disk only as the archive backing for closed
# experiments (heilbron/adversarial-repro-v1, adversarial-repro-v2,
# v1-honest-repro). New experiments must reference heilbron_smooth_v1.
#
# Why v1 worked — refined hypothesis (preserved from heilbron_repro_v1.yaml):
#
# In v1, D consistently reached 2.1–2.4× more generations than G within
# the same wallclock window (A1: G=12 D=27, A2: G=12 D=29, C1: G=8 D=17,
# C2: G=9 D=19). This asymmetric compute rate is the core mechanism —
# D's mutation-apply step is cheaper than G's config-generation step,
# so D burns through epochs faster. v1's old min_delta=1 sync condition
# was effectively permissive (continuously-publishing opponents trivially
# satisfy "opponent advanced by 1 since my last sync"), so neither side
# was throttled and the natural compute ratio emerged.
#
# The new drift-cap hook has different semantics: drift_cap=N means
# "block while I am more than N ahead of opponent". A small cap enforces
# lockstep, KILLING the asymmetric-rate mechanism. To preserve v1's
# behavior we set drift_cap to a practical no-op value (100_000 — larger
# than any realistic per-run program count of ~400). The hook is then
# retained ONLY as KF-07 deadlock safety — mutual-wait remains impossible
# by construction.
#
# Requires at run time:
#   opponent_redis_db=N
#   opponent_redis_prefix=...
#   feedback_mode=composition|gradient_in_prompt
#   population_role=constructor|improver
#   d_sees_g_source=true (only for D / improver runs)
#   d_archive_persistent=true (only for D runs)
#
# Residual gaps vs v1 (honest inventory — NOT a bit-for-bit replay):
#   1. v1 bugs that caused early process death (KF-01, KF-04, etc.) are
#      all fixed — runs will now reach the configured mutation budget
#      instead of dying at gen 8–29. If v1's success depended on catching
#      peaks before D-collapse pathology, monitor best-fitness trajectory
#      per gen.
#   2. Library code (pipeline builders, injection hooks, steady-state
#      engine) has drifted since commit 04bd5e69. Only hyperparameters
#      and problem files are frozen.
#   3. Same model family (Qwen3-235B-A22B-Thinking-2507) but proxy/temp
#      defaults may differ.
#   4. Fitness smoothing (linear on G, tanh on D) is a deliberate
#      departure from v1's hard floors — see KF-06 for context. The
#      hard-floor behavior is no longer reachable from this pipeline.

defaults:
  - adversarial_asymmetric
  # Top-level aggregator group (config.yaml defaults to `aggregator=none`).
  # Launch scripts set `aggregator=heilbron_improver` (D) or
  # `aggregator=heilbron_constructor` (G). The pipeline body below routes
  # that SAME singleton into both ParseMetricsStage (program.metrics) and
  # SBF-Lineage (shared-subset TransitionEvidence metrics) via
  # ${ref:aggregator}, so the two slots can never drift.

# drift_cap=100000 is a deliberate no-op: it emulates v1's effectively
# unthrottled behavior so D's natural ~2.2× compute advantage over G
# emerges. The hook is retained solely for KF-07 deadlock safety
# (mutual-wait impossible by construction even at cap=infinity).
pre_step_hook:
  _target_: gigaevo.adversarial.sync.ProgressBasedSyncHook
  host: ${redis.host}
  port: ${redis.port}
  own_db: ${redis.db}
  own_prefix: ${problem.name}  # I-12: ${redis.prefix} is undefined repo-wide; convention is ${problem.name} (matches redis_storage.key_prefix in config/redis/default.yaml:15)
  sources:
    - db: ${opponent_redis_db}
      prefix: ${opponent_redis_prefix}
  drift_cap: 100000
  min_delta: null # silence deprecation warning from parent config
  sync_every_n_epochs: 1
  timeout: 7200
  poll_interval: 5.0

# v1 had K=1 inner iterations (design said K=5 but K=1 is what ran).
# Explicitly locked here so the compute-asymmetry knob cannot drift.
inner_iterations: 1
n_opponents: 1
source_prompt_k: 1

# Route the top-level `aggregator` singleton into BOTH ParseMetricsStage
# (program.metrics composition) and SBF-Lineage (shared-subset
# TransitionEvidence). The shared reference guarantees schema parity —
# drift between the two slots is impossible by construction.
# Launch MUST pass `aggregator=heilbron_improver` (D) or
# `aggregator=heilbron_constructor` (G); the top-level default is
# NullAggregator, which leaves ParseMetricsStage uninstalled and causes
# SBF-Lineage to raise at build-time (no silent fallback).
pipeline_builder:
  aggregator: ${ref:aggregator}
  lineage_filter:
    _target_: gigaevo.adversarial.asymmetric_pipeline.LineageFilterConfig
    min_shared: 1
    inject_shared_evidence: true
    aggregator: ${ref:aggregator}
