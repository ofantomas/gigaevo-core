gen_delta: 100000

# Number of known ideas bundled into one RecordList (and one LLM comparison block)
list_max_ideas: 20

# LLM model name used by IdeaAnalyzer
model: "google/gemini-3-flash-preview"

# OpenRouter reasoning controls (used when base_url points to openrouter.ai)
reasoning:
  effort: "minimal"

# Desription rewriting settings
description_rewriting: true

# Connection settings for RedisRunConfig
redis:
  redis_host: "localhost"
  redis_port: 6379
  redis_db: 0
  redis_prefix: "alphaevolve/packing_circles/n_26"
  label: ""

# Statistics settings
statistics:
  enabled: false
  mode: "top_k" # available modes: top_k (top_delta_fitness and top_fitness), top_fitness, delta_fitness
  top_k_delta_fitness: 5
  top_k_fitness: 5

# Experimental features (may change or be removed in future versions)
experimental_features:
  # ML-based impact analysis pipeline (Bootstrap ElasticNet)
  ml_impact_pipeline:
    enabled: true
    n_iterations: 200            # bootstrap repetitions (more = tighter CIs, slower)
    include_interactions: true   # detect pairwise idea interaction effects
    max_interaction_pairs: 10    # cap on interaction terms added
    min_idea_programs: 2         # minimum linked programs for an idea to be included
    confidence_level: 0.95       # CI width (0.90 / 0.95 / 0.99)
    random_state: 42             # seed for reproducibility
