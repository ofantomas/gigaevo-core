defaults:
  - experiment: base       # Base experiment setup (override with experiment=full_featured)
  - /migration_bus: disabled
  - ideas_tracker: none    # Post-run ideas analysis (override with ideas_tracker=default)
  - _self_

# Problem metadata (set via command line or problem-specific config)
problem:
  name: ???  # Required
  dir: ${hydra:runtime.cwd}/problems/${problem.name}

# Optional override for memory checkpoint directory.
# Used by memory GAM agent and ideas tracker memory write pipeline.
checkpoint_dir: null

# Optional override for api.namespace in memory config.
namespace: null
