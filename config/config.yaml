defaults:
  - experiment: base       # Base experiment setup (override with experiment=full_featured)
  - /migration_bus: disabled
  - ideas_tracker: none    # Post-run ideas analysis (override with ideas_tracker=default)
  - memory: none           # Memory provider (override with memory=local for treatment arms)
  - aggregator: none       # NullAggregator sentinel (override with aggregator=heilbron_improver|heilbron_constructor)
  - stopper: max_mutants  # Pluggable stopper (override with stopper=wall_clock, stopper=fitness_plateau, ...)
  - chains/runner: none    # Chain runner preset for chain-task problems (override with chains/runner=simple|dataset|metrics|self_critic*)
  - _self_

# Problem metadata (set via command line or problem-specific config)
problem:
  name: ???  # Required
  dir: ${hydra:runtime.cwd}/problems/${problem.name}

# Memory checkpoint directory. Per-run by default — lands under the Hydra
# run dir for isolation across concurrent runs. Override on the CLI
# (`checkpoint_dir=/abs/path`) to share a card bank across runs.
checkpoint_dir: ${hydra:runtime.output_dir}/memory

# Optional override for api.namespace in memory config.
namespace: null
