defaults:
  - experiment: base       # Base experiment setup (override with experiment=full_featured)
  - /migration_bus: disabled
  - _self_

# Problem metadata (set via command line or problem-specific config)
problem:
  name: ???  # Required
  dir: ${hydra:runtime.cwd}/problems/${problem.name}

# Optional post-run ideas analysis from Redis.
ideas_tracker: false

# Optional override for memory checkpoint directory.
# Used by memory GAM agent when memory_enabled=true, and by ideas tracker
# final memory write when ideas_tracker.memory_write_pipeline.enabled=true.
# Example: checkpoint_dir=outputs/custom_memory_checkpoint
checkpoint_dir: null
