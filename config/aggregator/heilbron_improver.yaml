# Heilbron D-side (pop_b / improver) aggregator.
#
# Produces the exact program.metrics schema emitted by
# problems/heilbron_repro_v1/pop_b/evaluate.py from per_opp_metrics records
# ({pre_q, post_q, delta, score, is_valid}). Consumed by
# SharedBenchmarkFilteredLineageStage to re-aggregate metrics over the
# subset of opponents both parent and child programs faced.
#
# metrics_context resolves to the top-level MetricsContext singleton
# (built by config/algorithm/_base.yaml from ProblemContext); the ref
# resolver memoizes, so every consumer sees the same object.
_target_: gigaevo.programs.metrics.aggregators.ConfigurableAggregator
metrics_context: ${ref:metrics_context}
outputs:
  is_valid:
    _target_: gigaevo.programs.metrics.aggregators.ConstantSpec
    value: 1.0
  n_opponents:
    _target_: gigaevo.programs.metrics.aggregators.ReduceSpec
    op: count
  fitness:
    _target_: gigaevo.programs.metrics.aggregators.ReduceSpec
    op: mean
    field: score
  actual_fitness:
    _target_: gigaevo.programs.metrics.aggregators.ReduceSpec
    op: max
    field: post_q
  mean_pre_quality:
    _target_: gigaevo.programs.metrics.aggregators.ReduceSpec
    op: mean
    field: pre_q
  mean_post_quality:
    _target_: gigaevo.programs.metrics.aggregators.ReduceSpec
    op: mean
    field: post_q
  max_post_quality:
    _target_: gigaevo.programs.metrics.aggregators.ReduceSpec
    op: max
    field: post_q
  mean_improvement_raw:
    _target_: gigaevo.programs.metrics.aggregators.ReduceSpec
    op: mean
    field: delta
invalid_defaults:
  is_valid: 0.0
  n_opponents: 0.0
  fitness: -1.0
  actual_fitness: -1.0
  mean_pre_quality: -1.0
  mean_post_quality: -1.0
  max_post_quality: -1.0
  mean_improvement_raw: -1.0
