# @package _global_
# Cross-run migration bus — fully-connected topology.
# Each run publishes rejected-but-valid programs; any other run can claim them exclusively.
#
# Usage:
#   python run.py migration_bus=bus redis.db=0  # Run A
#   python run.py migration_bus=bus redis.db=2  # Run B
#   python run.py migration_bus=bus redis.db=3  # Run C
#
# All runs must use the same stream_key and bus_db. Each run needs a unique redis.db.

migration_node:
  _target_: gigaevo.evolution.bus.MigrationNode
  run_id: "${problem.name}@db${redis.db}"
  transport:
    _target_: gigaevo.evolution.bus.RedisStreamTransport
    run_id: "${problem.name}@db${redis.db}"
    stream_key: "gigaevo:${problem.name}:migration_bus"
    host: ${redis.host}
    port: ${redis.port}
    db: ${migration_bus_db}
    max_stream_len: 1000
    claim_ttl: 120
  topology:
    _target_: gigaevo.evolution.bus.BusTopology
  max_buffer_size: 30
  consume_interval: 3.0
  max_consume_per_poll: 20

# Single _target_ swap — everything else inherited from evolution/default.yaml
evolution_engine:
  _target_: gigaevo.evolution.bus.BusedEvolutionEngine
  migration_node: ${migration_node}
  max_imports_per_generation: 10

# Dedicated Redis DB for bus transport (must not collide with run DBs)
migration_bus_db: 15
