# @package _global_
# Logging configuration

log_rotation: "50 MB"
log_retention: "30 days"
log_dir: ${hydra:runtime.output_dir}
tag: experiment

# Live flow-profiler dashboard (profile_live.html).
live_profiler:
  # Initial y-axis window: only the most recent N programs are visible on
  # page open. Toolbar buttons let viewers widen or show all. Set to 0 to
  # disable clipping entirely.
  last_n: 50
  # Seconds between re-renders.
  interval_s: 60.0

# Live frontier-comparison loop — periodic in-run snapshot of how the
# current population compares to the frontier (best-so-far / HoF).
# See gigaevo/monitoring/live_frontier_compare.py.
live_frontier_compare:
  # Set to false to disable the loop entirely.
  enabled: true
  # Seconds between comparison snapshots.
  interval_s: 60.0
  # Metric names to compare. Must match the keys MetricsTracker writes
  # (typically the names in the problem's metrics.yaml).
  metrics: ["fitness"]
  # Where the frontier comes from. v1 only supports "hof" (the current
  # run's hall-of-fame as written by MetricsTracker to Redis). Other
  # values are reserved for future implementations.
  frontier_source: "hof"
  # Emit targets: subset of ["log", "telegram"]. "log" writes via loguru
  # at INFO; "telegram" calls tools.telegram_notify.notify.
  emit_targets: ["log"]
