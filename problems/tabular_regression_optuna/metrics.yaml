specs:
  fitness:
    description: Negative mean RMSE across k-fold CV on train ∪ val (higher is better, perfect = 0). MAP-Elites selection signal.
    decimals: 5
    is_primary: true
    higher_is_better: true
    lower_bound: -1.5
    upper_bound: 0.0
    include_in_prompts: true
    significant_change: 1.0e-4
  is_valid:
    description: Whether the program is valid (1 valid, 0 invalid)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
  cv_rmse_mean:
    description: Mean RMSE across k-fold CV on combined train+val (raw target scale, default k=5). Drives fitness.
    decimals: 5
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 1.5
    include_in_prompts: true
    significant_change: 1.0e-4
  cv_rmse_std:
    description: Std of per-fold RMSE across k-fold CV (fold-to-fold stability; small = consistent, large = brittle).
    decimals: 5
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 0.5
    include_in_prompts: true
    significant_change: 1.0e-4
