specs:
  fitness:
    description: Mean deceptiveness across opponent optimizers (1.0 = maximally deceptive, 0.0 = trivial)
    decimals: 4
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
  is_valid:
    description: Whether the landscape is valid (correct optimum, deterministic)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
  n_opponents:
    description: Number of opponent optimizers evaluated against
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 10.0
    include_in_prompts: false
    significant_change: 1.0
