specs:
  fitness:
    description: Mean failure rate of opponent parsers on generated tests (higher = better adversarial tests)
    decimals: 4
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
  is_valid:
    description: Whether the generator produces valid test expressions (1 valid, 0 invalid)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
