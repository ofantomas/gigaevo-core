specs:
  fitness:
    description: Mean deceptiveness — how far opponent optimizers land from the global optimum (1.0 = maximally deceptive)
    decimals: 4
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
  is_valid:
    description: Whether the landscape is valid (has optimum, callable, deterministic)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
