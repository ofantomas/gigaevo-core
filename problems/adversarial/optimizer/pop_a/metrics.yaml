specs:
  fitness:
    description: Mean optimization quality across opponent landscapes (1.0 = perfect, 0.0 = worst)
    decimals: 4
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
  is_valid:
    description: Whether the optimizer runs without errors (1 valid, 0 invalid)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
