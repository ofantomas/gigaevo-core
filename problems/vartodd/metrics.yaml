display_order: [fitness, runtime, is_valid]
specs:
  fitness:
    description: Primary objective. Corresponds to rank + sum(P)/P.size(), where P is found decomposition (fitness does not dependends on loss in program)
    decimals: 3
    is_primary: true
    higher_is_better: false
    upper_bound: 230
    lower_bound: 180
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: 230
  runtime:
    description: Program runtime in seconds
    decimals: 0
    is_number: true
    is_primary: false
    upper_bound: 3600
    lower_bound: 0
    higher_is_better: false
    include_in_prompts: true
    significant_change: 1
    sentinel_value: 3600

  is_valid:
    description: Program validity (1 valid, 0 invalid)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0
    upper_bound: 1
    include_in_prompts: true
    sentinel_value: 0
