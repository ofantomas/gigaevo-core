specs:
  fitness:
    description: "Success rate — fraction of mutations that improved fitness over parent"
    higher_is_better: true
    is_primary: true
    lower_bound: 0.0
    upper_bound: 1.0
    sentinel_value: -1.0

  is_valid:
    description: "Whether the program compiled and entrypoint() returned a non-empty string"
    higher_is_better: true
    is_primary: false
    lower_bound: 0.0
    upper_bound: 1.0
    sentinel_value: 0.0

  prompt_length:
    description: "Length of the returned prompt string in characters (behavior dimension)"
    higher_is_better: false
    is_primary: false
    lower_bound: 0.0
    upper_bound: 10000.0
    sentinel_value: 0.0
