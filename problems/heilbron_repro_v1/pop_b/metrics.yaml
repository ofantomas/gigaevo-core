specs:
  fitness:
    description: "MAP-Elites selection signal: mean over opponent configs of min(improvement / 0.0365, 1). Worsening counts as 0, not negative."
    decimals: 5
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1.0
  is_valid:
    description: "1 if the improver callable ran successfully, 0 otherwise."
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0
  actual_fitness:
    description: "Best post-improvement min_area achieved across all opponent configs."
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: true
    significant_change: 0.001
    sentinel_value: -1.0
  mean_improvement_raw:
    description: "Mean improvement in raw min_area units across opponent configs."
    decimals: 6
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1.0
  mean_pre_quality:
