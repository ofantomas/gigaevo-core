    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1.0
  n_opponents:
    description: "Number of opponent configurations evaluated against."
    decimals: 0
