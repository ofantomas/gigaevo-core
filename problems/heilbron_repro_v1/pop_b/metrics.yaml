    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1.0
  mean_post_quality:
    description: "Mean min_area of opponent configs after this improver ran."
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
