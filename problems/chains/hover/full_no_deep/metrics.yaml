specs:
  fitness:
    description: "Soft (fractional) retrieval coverage on multi-hop questions. Higher is better."
    decimals: 3
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.003
    sentinel_value: -1000.0
  is_valid:
    description: "Whether the program is valid (1 valid, 0 invalid)"
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0.0
  n_steps:
    description: "Total number of steps in the chain (LLM + tool)"
    decimals: 0
    is_primary: false
    higher_is_better: false
    lower_bound: 1.0
    upper_bound: 15.0
    include_in_prompts: false
    significant_change: 1.0
    sentinel_value: 0.0
  n_tool_steps:
    description: "Number of tool (retrieval) steps in the chain"
    decimals: 0
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 15.0
    include_in_prompts: false
    significant_change: 1.0
    sentinel_value: 0.0
