specs:
  fitness:
    description: "Adversarial fitness: 0.5*quality + 0.5*sigmoid_resistance (drives MAP-Elites selection)"
    decimals: 5
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1.0
  is_valid:
    description: "Whether the constructor output is valid (1 valid, 0 invalid)"
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0
  actual_fitness:
    description: "Raw min_area of the constructor output (true Heilbron objective, for paper reporting)"
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: true
    significant_change: 0.001
    sentinel_value: -1.0
  quality:
    description: "Normalized quality = min(min_area / 0.0365, 1.0)"
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: false
    significant_change: 0.01
    sentinel_value: -1.0
  resistance:
    description: "Mean sigmoid(-delta/T) across opponents, T=Q_MAX/9 — soft resistance signal"
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1.0
  mean_improvement:
    description: "Mean raw improvement (delta in min_area units) achieved by opponents"
    decimals: 6
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1.0
  best_post_improvement:
    description: "Best min_area achieved by any opponent improver on this config"
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1.0
  n_opponents:
    description: "Number of opponent improvers evaluated against"
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 10.0
    include_in_prompts: false
    significant_change: 1.0
    sentinel_value: -1.0
