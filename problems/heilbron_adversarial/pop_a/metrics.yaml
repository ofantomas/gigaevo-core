specs:
  fitness:
    description: "Adversarial fitness in (0,1): ALPHA*quality + (1-ALPHA)*resistance, ALPHA=0.5. Resistance is smoothed via tanh on opponent improvement (see resistance metric); not a hard threshold."
    decimals: 5
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1000.0
  is_valid:
    description: "Whether the constructor output is valid (1 valid, 0 invalid)"
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0
  actual_fitness:
    description: "Raw min_area of the constructor output (true Heilbron objective, for paper reporting)"
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: true
    significant_change: 0.001
    sentinel_value: -1000.0
  quality:
    description: "Normalized quality = min(min_area / 0.0365, 1.0)"
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: false
    significant_change: 0.01
    sentinel_value: -1000.0
  resistance:
    description: "Smoothed resistance to opponents in (0,1): mean over opponents of (tanh(-delta/Q_MAX)+1)/2 where delta = post_quality - raw_quality. >0.5 means opponents made the config worse on average; <0.5 means they improved it. Equals 1.0 only when no opponent ran (cold start / all failed)."
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1000.0
  mean_improvement:
    description: "Mean raw improvement (delta in min_area units) achieved by opponents"
    decimals: 6
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1000.0
  best_post_improvement:
    description: "Best min_area achieved by any opponent improver on this config"
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1000.0
  n_opponents:
    description: "Number of opponent improvers evaluated against"
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 10.0
    include_in_prompts: false
    significant_change: 1.0
    sentinel_value: -1000.0
  g_tracker_coverage_count:
    description: "Career count of distinct D improvers this G has resisted (delta <= 0)."
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 150.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: -1.0
