specs:
  fitness:
    description: "MAP-Elites selection signal: 0.5 * quality + 0.5 * resistance."
    decimals: 5
    is_primary: true
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1.0
  is_valid:
    description: "1 if the configuration satisfies all constraints, 0 otherwise."
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 1.0
    sentinel_value: 0
  actual_fitness:
    description: "Raw min_area of the configuration (the Heilbronn objective, reported unnormalized)."
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: true
    significant_change: 0.001
    sentinel_value: -1.0
  quality:
    description: "min_area normalized to [0, 1] by dividing by the target 0.0365 and clamping."
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: false
    significant_change: 0.01
    sentinel_value: -1.0
  resistance:
    description: "Mean over opponents of 1 - min(improvement / 0.0365, 1). 1.0 = no opponent improved the configuration; 0.0 = opponents improved it by the full target on average."
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 1.0
    include_in_prompts: true
    significant_change: 0.01
    sentinel_value: -1.0
  mean_improvement:
    description: "Mean improvement in raw min_area units produced by opponents (lower = more resistant)."
    decimals: 6
    is_primary: false
    higher_is_better: false
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1.0
  best_post_improvement:
    description: "Highest min_area any opponent reached after improving this configuration."
    decimals: 5
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 0.0365
    include_in_prompts: false
    significant_change: 0.001
    sentinel_value: -1.0
  n_opponents:
    description: "Number of opponents this configuration was evaluated against."
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0.0
    upper_bound: 10.0
    include_in_prompts: false
    significant_change: 1.0
    sentinel_value: -1.0
