schema_version: 2
contract:
  identity:
    name: sella/full_sella_baseline_evolution
    task: sella
    branch: full-sella-baseline-evolution
  problem:
    name: full_sella_baseline_evolution
    has_test_set: false        # held-out test_XTB.json is NOT evaluated during the run
                               # (fitness is computed on train); kept out of the manifest
                               # to avoid the impression that evolution sees the test set.
    fitness_type: continuous
    metric_name: fitness
  config:
    problem_name: full_sella_baseline_evolution
    pipeline: intra_extra_memory
    llm_model: qwen/qwen3.7-max
    max_generations: null
    shared_overrides:
      mutation_mode: diff
      num_parents: 1
      algorithm: single_island
      max_concurrent_dags: 5
      max_code_length: 200000
      problem.dir: /home/tsypin/opt_problem_fsbe
  runs:
    - label: A1
      db: 1
      prefix: full_sella_baseline_evolution
      pipeline: intra_extra_memory
      problem_name: full_sella_baseline_evolution
      condition: diff_baseline
      model_name: qwen/qwen3.7-max
      mutation_url: https://openrouter.ai/api/v1
  servers:
    - https://openrouter.ai/api/v1
  max_generations: 1000000          # effectively open-ended (drives max_mutants); stop manually
  baseline:
    reference: sella
    metric: mean_rel_steps
lifecycle:
  status: implemented
  smoke_test:
    completed: true
    db: 1
    generations: 3
  treatment_verification:
    completed: true          # single-condition run (no A/B treatment) -> N/A
control_plane:
  notifications:
    telegram:
      enabled: false          # api.telegram.org unreachable from coordinator; rely on Langfuse + gigaevo status
    pr:
      enabled: false          # standalone run, no GitHub PR target
